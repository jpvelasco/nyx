name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      # nmap is required for many integration-style tests (subnet_discovery, etc.)
      # Without it, tests either skip or fail depending on how the backend is exercised.
      - name: Install nmap
        run: sudo apt-get update && sudo apt-get install -y nmap
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o nyx ./cmd/nyx/

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -o nyx-${GOOS}-${GOARCH}${EXT} ./cmd/nyx/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nyx-*
