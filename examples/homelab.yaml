# Example nyx spec — realistic 7-VLAN homelab with WireGuard, IoT isolation, and
# controller-backed ACL enforcement. Adjust CIDRs, gateways, and policies to match
# your environment.

version: 1
site: home-lab

# ============================================================
# Networks — one entry per VLAN
# ============================================================
networks:
  - name: main
    cidr: 192.168.0.0/24
    gateway: 192.168.0.254
    zone: trusted
    vlan: 1

  - name: mgmt
    cidr: 192.168.10.0/24
    gateway: 192.168.10.1
    zone: management
    vlan: 10

  - name: mobile
    cidr: 192.168.20.0/24
    gateway: 192.168.20.1
    zone: mobile
    vlan: 20

  - name: gaming
    cidr: 192.168.30.0/24
    gateway: 192.168.30.1
    zone: gaming
    vlan: 30

  - name: servers
    cidr: 172.16.40.0/24
    gateway: 172.16.40.1
    zone: servers
    vlan: 40

  - name: media
    cidr: 192.168.50.0/24
    gateway: 192.168.50.1
    zone: media
    vlan: 50

  - name: iot
    cidr: 192.168.60.0/24
    gateway: 192.168.60.1
    zone: iot
    vlan: 60

# ============================================================
# VPN
# ============================================================
vpn:
  - name: home-wg
    type: wireguard
    interface: wg0
    expected_routes:
      - 192.168.0.0/16
    mode: split-tunnel

# ============================================================
# Probes — remote SSH hosts for checks that can't run locally
# ============================================================
probes:
  - name: iot-laptop
    host: 192.168.60.15
    user: deploy
    vlan: iot

# ============================================================
# Policies — declared intent for inter-VLAN traffic
# ============================================================
policies:
  # IoT — internet only, no internal access
  - name: iot-to-trusted-deny
    from: iot
    to: trusted
    action: deny

  - name: iot-to-management-deny
    from: iot
    to: management
    action: deny

  - name: iot-to-servers-deny
    from: iot
    to: servers
    action: deny

  - name: iot-to-media-deny
    from: iot
    to: media
    action: deny

  - name: iot-to-mobile-deny
    from: iot
    to: mobile
    action: deny

  # Management — locked down, only trusted can reach it
  - name: mobile-to-management-deny
    from: mobile
    to: management
    action: deny

  - name: gaming-to-management-deny
    from: gaming
    to: management
    action: deny

  - name: media-to-management-deny
    from: media
    to: management
    action: deny

  # Mobile — can reach trusted LAN, not servers directly
  - name: mobile-to-servers-deny
    from: mobile
    to: servers
    action: deny

  # Trusted — can reach servers for printing, file shares, etc.
  - name: trusted-to-servers-allow
    from: trusted
    to: servers
    action: allow

# ============================================================
# Assertions — what we actually verify with live checks
# ============================================================
assertions:

  # --- Host discovery: verify expected device counts per VLAN ---

  - type: subnet_discovery
    network: main
    expect_hosts_min: 10
    expect_hosts_max: 30

  - type: subnet_discovery
    network: mobile
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: servers
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: media
    expect_hosts_min: 1
    expect_hosts_max: 10

  # --- Route checks: verify critical paths exist ---

  - type: route_check
    target: 192.168.0.254

  - type: route_check
    target: 172.16.40.1

  - type: route_check
    target: 192.168.50.1

  - type: route_check
    target: 8.8.8.8

  # --- VPN: traffic to internal hosts should use WireGuard ---

  - type: vpn_route
    vpn: home-wg
    target: 192.168.20.15
    expect_tunnel: true

  # --- Isolation: verify VLANs cannot reach each other when they shouldn't ---
  # NOTE: These checks run from this machine (main/trusted VLAN).
  # For accurate isolation verification of IoT and guest VLANs, run
  # nyx from a host inside each source VLAN.

  - type: isolation
    from: trusted
    to: iot
    expect: deny

  - type: isolation
    from: trusted
    to: management
    expect: deny

  # --- Health: verify gateway latency and packet loss ---

  - type: network_health
    target: 192.168.0.254
    expect_latency_ms: 10
    expect_loss_pct: 0

  # --- Port check: verify media server ports are accessible ---

  - type: port_check
    target: 192.168.50.5
    ports: [8096, 8920]
    expect: open
    scan_mode: polite

  # --- DNS check: verify internal hostname resolves correctly ---

  - type: dns_check
    query: nas.home.lan
    expect_ip: 192.168.50.5
    server: 192.168.0.254

  # --- ACL check: verify IoT VLAN is isolated via controller policy ---

  - type: acl_check
    provider: omada
    policy: iot-to-management-deny
    expect: enforced

  # --- Remote probe: isolation from IoT VLAN (runs via SSH) ---

  - type: isolation
    from: iot
    to: management
    expect: deny
    runner: iot-laptop
