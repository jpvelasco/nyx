# nyx Example Spec — Realistic 7-VLAN Homelab
#
# This is a realistic, generic example of a segmented homelab network.
# It demonstrates all major features: networks, policies, probes, VPN,
# and the full range of assertion types including remote checks via runners.

version: 1
site: home-lab

# ============================================================
# Networks — one entry per VLAN / segment
# ============================================================
networks:
  - name: trusted
    cidr: 10.0.10.0/24
    gateway: 10.0.10.1
    zone: trusted
    vlan: 10

  - name: management
    cidr: 10.0.11.0/24
    gateway: 10.0.11.1
    zone: management
    vlan: 11

  - name: personal
    cidr: 10.0.20.0/24
    gateway: 10.0.20.1
    zone: personal
    vlan: 20

  - name: gaming
    cidr: 10.0.30.0/24
    gateway: 10.0.30.1
    zone: gaming
    vlan: 30

  - name: servers
    cidr: 10.0.40.0/24
    gateway: 10.0.40.1
    zone: servers
    vlan: 40

  - name: media
    cidr: 10.0.50.0/24
    gateway: 10.0.50.1
    zone: media
    vlan: 50

  - name: iot
    cidr: 10.0.60.0/24
    gateway: 10.0.60.1
    zone: iot
    vlan: 60

# ============================================================
# VPN
# ============================================================
vpn:
  - name: home-wg
    type: wireguard
    interface: wg0
    expected_routes:
      - 10.0.0.0/8
    mode: split-tunnel

# ============================================================
# Probes — remote SSH hosts for checks that must run from other VLANs
# ============================================================
probes:
  - name: iot-probe
    host: 10.0.60.15
    user: admin
    vlan: iot

# ============================================================
# Policies — declared intent for inter-zone traffic
# ============================================================
policies:
  # IoT — internet only, no access to internal networks
  - name: iot-to-trusted-deny
    from: iot
    to: trusted
    action: deny

  - name: iot-to-management-deny
    from: iot
    to: management
    action: deny

  - name: iot-to-servers-deny
    from: iot
    to: servers
    action: deny

  - name: iot-to-media-deny
    from: iot
    to: media
    action: deny

  - name: iot-to-personal-deny
    from: iot
    to: personal
    action: deny

  # Management — highly restricted
  - name: personal-to-management-deny
    from: personal
    to: management
    action: deny

  - name: gaming-to-management-deny
    from: gaming
    to: management
    action: deny

  - name: media-to-management-deny
    from: media
    to: management
    action: deny

  # Personal devices — can reach trusted and media, but not servers directly
  - name: personal-to-servers-deny
    from: personal
    to: servers
    action: deny

  # Trusted can reach servers for management/printing
  - name: trusted-to-servers-allow
    from: trusted
    to: servers
    action: allow

# ============================================================
# Assertions — live checks that validate the declared intent
# ============================================================
assertions:
  # --- Subnet discovery: verify expected number of devices per segment ---
  - type: subnet_discovery
    network: trusted
    expect_hosts_min: 10
    expect_hosts_max: 30

  - type: subnet_discovery
    network: personal
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: servers
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: media
    expect_hosts_min: 1
    expect_hosts_max: 10

  # --- Route checks: verify critical paths exist ---
  - type: route_check
    target: 10.0.10.1

  - type: route_check
    target: 10.0.40.1

  - type: route_check
    target: 10.0.50.1

  - type: route_check
    target: 8.8.8.8

  # --- VPN routing ---
  - type: vpn_route
    vpn: home-wg
    target: 10.0.20.50
    expect_tunnel: true

  # --- Isolation checks (run from trusted vantage by default) ---
  - type: isolation
    from: trusted
    to: iot
    expect: deny

  - type: isolation
    from: trusted
    to: management
    expect: deny

  - type: isolation
    from: personal
    to: servers
    expect: deny

  # --- Network health ---
  - type: network_health
    target: 10.0.10.1
    expect_latency_ms: 10
    expect_loss_pct: 0

  # --- Port checks ---
  - type: port_check
    target: 10.0.50.5
    ports: [8096, 8920]
    expect: open
    scan_mode: polite

  # --- DNS resolution ---
  - type: dns_check
    query: nas.home.example
    expect_ip: 10.0.50.5
    server: 10.0.10.1

  # --- Controller ACL enforcement (requires omada provider credentials) ---
  - type: acl_check
    provider: omada
    policy: iot-to-management-deny
    expect: enforced

  # --- Remote isolation check via probe (runs from inside IoT) ---
  - type: isolation
    from: iot
    to: management
    expect: deny
    runner: iot-probe
