# Netaudit spec for a typical homelab with VLANs, VPN, and isolation policies.
# Adjust CIDRs, gateways, and VPN settings to match your environment.

version: 1
site: home-lab

networks:
  - name: mgmt
    cidr: 10.0.10.0/24
    gateway: 10.0.10.1
    zone: management
    vlan: 10

  - name: clients
    cidr: 10.0.20.0/24
    gateway: 10.0.20.1
    zone: clients
    vlan: 20

  - name: iot
    cidr: 10.0.30.0/24
    gateway: 10.0.30.1
    zone: iot
    vlan: 30

  - name: servers
    cidr: 10.0.40.0/24
    gateway: 10.0.40.1
    zone: servers
    vlan: 40

  - name: guest
    cidr: 10.0.50.0/24
    gateway: 10.0.50.1
    zone: guest
    vlan: 50

vpn:
  - name: home-wg
    type: wireguard
    interface: wg0
    expected_routes:
      - 10.0.0.0/16
    mode: split-tunnel

probes:
  - name: laptop
    host: 192.168.30.45
    user: jp
    vlan: iot

policies:
  - name: iot-isolation
    from: iot
    to: management
    action: deny
    except:
      - protocol: tcp
        port: 443
        target: 10.0.10.5

  - name: guest-isolation
    from: guest
    to: management
    action: deny

  - name: guest-server-isolation
    from: guest
    to: servers
    action: deny

  - name: iot-server-isolation
    from: iot
    to: servers
    action: deny

assertions:
  # Discovery: make sure management network has a reasonable number of hosts
  - type: subnet_discovery
    network: mgmt
    expect_hosts_max: 30

  # Discovery: clients subnet should have some hosts
  - type: subnet_discovery
    network: clients
    expect_hosts_min: 1
    expect_hosts_max: 50

  # Isolation: IoT should not reach management
  - type: isolation
    from: iot
    to: management
    expect: deny

  # Isolation: guest should not reach servers
  - type: isolation
    from: guest
    to: servers
    expect: deny

  # VPN: traffic to internal hosts should go through WireGuard
  - type: vpn_route
    vpn: home-wg
    target: 10.0.20.15
    expect_tunnel: true

  # Route: verify default gateway for management
  - type: route_check
    target: 10.0.10.1

  # Port check: verify Jellyfin server ports are accessible
  - type: port_check
    target: 10.0.40.5
    ports: [8096, 8920]
    expect: open
    scan_mode: polite

  # DNS check: verify internal hostname resolves correctly
  - type: dns_check
    query: nas.home.lan
    expect_ip: 10.0.40.5
    server: 10.0.10.1

  # Network health: verify gateway latency and packet loss
  - type: network_health
    target: 10.0.10.1
    expect_latency_ms: 10
    expect_loss_pct: 0

  # ACL check: verify IoT VLAN is isolated via controller policy
  - type: acl_check
    provider: omada
    policy: iot-isolation
    expect: enforced

  # Isolation from IoT VLAN (runs via SSH probe on laptop)
  - type: isolation
    from: iot
    to: management
    expect: deny
    runner: laptop
