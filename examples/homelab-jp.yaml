version: 1
site: jp-homelab

# ============================================================
# Networks — one entry per VLAN
# ============================================================
networks:
  - name: nightfall
    cidr: 192.168.0.0/24
    gateway: 192.168.0.254
    zone: trusted
    vlan: 1

  - name: opus
    cidr: 192.168.10.0/24
    gateway: 192.168.10.1
    zone: management
    vlan: 10

  - name: valhalla
    cidr: 192.168.20.0/24
    gateway: 192.168.20.1
    zone: mobile
    vlan: 20

  - name: arcade
    cidr: 192.168.30.0/24
    gateway: 192.168.30.1
    zone: gaming
    vlan: 30

  - name: papyrus
    cidr: 172.16.40.0/24
    gateway: 172.16.40.1
    zone: servers
    vlan: 40

  - name: cinema
    cidr: 192.168.50.0/24
    gateway: 192.168.50.1
    zone: media
    vlan: 50

  - name: pinball
    cidr: 192.168.60.0/24
    gateway: 192.168.60.1
    zone: iot
    vlan: 60

# ============================================================
# Policies — declared intent for inter-VLAN traffic
# ============================================================
policies:
  # IoT (Pinball) — internet only, no internal access
  - name: pinball-to-trusted-deny
    from: iot
    to: trusted
    action: deny

  - name: pinball-to-management-deny
    from: iot
    to: management
    action: deny

  - name: pinball-to-servers-deny
    from: iot
    to: servers
    action: deny

  - name: pinball-to-media-deny
    from: iot
    to: media
    action: deny

  - name: pinball-to-mobile-deny
    from: iot
    to: mobile
    action: deny

  # Management (Opus) — locked down, only trusted can reach it
  - name: mobile-to-management-deny
    from: mobile
    to: management
    action: deny

  - name: gaming-to-management-deny
    from: gaming
    to: management
    action: deny

  - name: iot-to-management-deny
    from: iot
    to: management
    action: deny

  - name: media-to-management-deny
    from: media
    to: management
    action: deny

  # Mobile (Valhalla) — can reach trusted LAN, not servers directly
  - name: mobile-to-servers-deny
    from: mobile
    to: servers
    action: deny

  # Printer (Papyrus) — accessible from trusted for printing
  - name: trusted-to-servers-allow
    from: trusted
    to: servers
    action: allow

# ============================================================
# Assertions — what we actually verify with live checks
# ============================================================
assertions:

  # --- Host discovery: verify expected device counts per VLAN ---

  - type: subnet_discovery
    network: nightfall
    expect_hosts_min: 10
    expect_hosts_max: 30

  - type: subnet_discovery
    network: valhalla
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: papyrus
    expect_hosts_min: 1
    expect_hosts_max: 10

  - type: subnet_discovery
    network: cinema
    expect_hosts_min: 1
    expect_hosts_max: 10

  # --- Route checks: verify critical paths exist ---

  # Default gateway reachable
  - type: route_check
    target: 192.168.0.254

  # Desktop can reach printer (AirPrint/IPP via mDNS relay)
  - type: route_check
    target: 172.16.40.1

  # Desktop can reach NAS
  - type: route_check
    target: 192.168.50.1

  # Internet reachable via gateway
  - type: route_check
    target: 8.8.8.8

  # --- Isolation: verify VLANs cannot reach each other when they shouldn't ---
  # NOTE: These checks run from this machine (Nightfall/trusted VLAN).
  # For accurate isolation verification of IoT and guest VLANs, run
  # nyx from a host inside each source VLAN.

  # IoT (Pinball) gateway should NOT be reachable from trusted
  # If it IS reachable, Omada ACLs between trusted->iot may be too permissive
  - type: isolation
    from: trusted
    to: iot
    expect: deny

  # Management (Opus) should NOT be reachable from trusted
  # (management VLAN is Omada-flagged as Isolated)
  - type: isolation
    from: trusted
    to: management
    expect: deny
