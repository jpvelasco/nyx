# .golangci.yml — run with: golangci-lint run ./...
# Core linters only (revive disabled to avoid pre-existing style churn on exported names, unused ctx params in interfaces, etc.)
version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
  disable:
    - typecheck
  fast: false

issues:
  exclude-dirs:
    - examples
    - testdata
    - specs
  exclude-rules:
    # Tests can be noisy on errcheck
    - path: '.*_test\.go'
      linters:
        - errcheck
    # Documented intentional for homelab (no real security boundary)
    - path: 'internal/probe/probe.go'
      linters:
        - gosec
    - path: 'internal/backends/omada/.*\.go'
      linters:
        - gosec
    # Pre-existing defer errcheck in audit engine (logout best-effort)
    - path: 'internal/audit/engine.go'
      linters:
        - errcheck
      text: "Logout"
  max-issues-per-linter: 0
  max-same-issues: 0
