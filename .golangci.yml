# .golangci.yml — run with: golangci-lint run ./...
# Core linters only (revive disabled to avoid pre-existing style churn on exported names, unused ctx params in interfaces, etc.)
version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  fast: false

formatters:
  enable:
    - gofmt
  fast: false

issues:
  exclude-dirs:
    - examples
    - testdata
    - specs
  exclude-rules:
    # Documented intentional for homelab (no real security boundary)
    - path: 'internal/probe/probe.go'
      linters:
        - gosec
    - path: 'internal/backends/omada/.*\.go'
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
